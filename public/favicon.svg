<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#f3e8f8"/>
  <!-- Dumbbell shape matching the EE logo -->
  <!-- Top plates -->
  <rect x="11" y="4"  width="10" height="2.5" rx="0.5" fill="#1a1a1a"/>
  <rect x="10" y="6.5" width="12" height="2.5" rx="0.5" fill="#1a1a1a"/>
  <!-- EE letters -->
  <text x="16" y="20" font-family="Arial, sans-serif" font-weight="700" font-size="9"
        fill="#1a1a1a" text-anchor="middle" letter-spacing="0.5">EE</text>
  <!-- Bottom plates -->
  <rect x="10" y="23" width="12" height="2.5" rx="0.5" fill="#1a1a1a"/>
  <rect x="11" y="25.5" width="10" height="2.5" rx="0.5" fill="#1a1a1a"/>
</svg>
